<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpticGrid | AI Yüz Analizi</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; }
        body { background-color: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; text-align: center; }
        .vogue-header { font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: 5px; margin-top: 30px; text-transform: uppercase; color: var(--gold); }
        .container { position: relative; width: 90%; max-width: 500px; margin: 20px auto; border: 2px solid var(--gold); border-radius: 15px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .btn-analyze { background: var(--gold); color: black; border: none; padding: 15px 40px; font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 30px; margin: 20px; transition: 0.3s; }
        .btn-analyze:disabled { background: #555; cursor: not-allowed; }
        #result-box { display: none; padding: 20px; background: rgba(255,255,255,0.05); margin: 20px auto; width: 80%; border-radius: 10px; border-left: 5px solid var(--gold); }
        .loading-spinner { display: none; margin: 10px auto; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--gold); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="vogue-header">OpticGrid</div>
    <p style="font-style: italic; opacity: 0.8;">Cihaz Üstü Yapay Zeka Analizi</p>

    <div class="container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="loading" class="loading-spinner"></div>
    <button id="start-btn" class="btn-analyze">ANALİZ ET</button>

    <div id="result-box">
        <h3 id="yuz-tipi" style="color: var(--gold); margin-bottom: 5px;"></h3>
        <p id="oneri-metni" style="font-size: 0.9rem; line-height: 1.6;"></p>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const resultBox = document.getElementById('result-box');
        const loading = document.getElementById('loading');

        // Kullanıcı verileri (Flask'tan geliyor)
        const userDetails = {
            ad: "{{ ad }}",
            yas: "{{ yas }}",
            cinsiyet: "{{ cinsiyet }}"
        };

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        let lastResults = null;
        faceMesh.onResults((results) => {
            lastResults = results;
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiFaceLandmarks) {
                // Burada istersen yüze çizim yapabilirsin (Vogue stili nokta çizimleri)
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();

        startBtn.addEventListener('click', async () => {
            if (!lastResults || !lastResults.multiFaceLandmarks) {
                alert("Yüzünüz henüz algılanmadı, lütfen kameraya yaklaşın.");
                return;
            }

            startBtn.disabled = true;
            loading.style.display = "block";

            const lm = lastResults.multiFaceLandmarks[0];
            const h = videoElement.videoHeight;
            const w = videoElement.videoWidth;

            // MediaPipe JS Landmark Hesaplama
            const top = lm[10]; const bottom = lm[152];
            const left = lm[234]; const right = lm[454];

            const y_yuk = Math.sqrt(Math.pow((top.x - bottom.x)*w, 2) + Math.pow((top.y - bottom.y)*h, 2));
            const y_gen = Math.sqrt(Math.pow((left.x - right.x)*w, 2) + Math.pow((left.y - right.y)*h, 2));
            const oran = y_yuk / y_gen;

            let res, rnk, oneri;
            const c = userDetails.cinsiyet;

            if (oran > 1.25) {
                res = "UZUN / OVAL"; rnk = (c === "Erkek" ? "Siyah" : "Rose Gold");
            } else if (oran > 0.95 && oran < 1.10) {
                res = "YUVARLAK"; rnk = (c === "Erkek" ? "Lacivert" : "Bordo");
            } else {
                res = "KARE / KALP"; rnk = (c === "Erkek" ? "Gümüş" : "Altın");
            }
            oneri = `Yüz tipiniz ${res}. Size en uygun çerçeveler ${rnk} tonlarındadır.`;

            // Ekranda Göster
            document.getElementById('yuz-tipi').innerText = res;
            document.getElementById('oneri-metni').innerText = oneri;
            resultBox.style.display = "block";
            loading.style.display = "none";

            // Veritabanına Kaydetmek için Render'a gönder (Hafif istek)
            fetch('/save_result', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ...userDetails, yuz_tipi: res, oneri: oneri })
            });
        });
    </script>
</body>
</html>
