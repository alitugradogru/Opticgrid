<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpticGrid | Elite VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --cream: #FDFBF7; --text: #2C2C2C; --border: #E5D5B7; }
        body { background: var(--cream); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        .vogue-header { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); letter-spacing: 5px; text-transform: uppercase; padding-top: 30px; margin: 0; }
        .container { position: relative; width: 90%; max-width: 440px; margin: 20px auto; border: 8px solid #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 40px rgba(197,160,89,0.15); background: #000; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        
        /* Kamera Değiştirme Tuşu */
        .cam-switch { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8); border: none; padding: 10px; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .btn-analyze { background: var(--gold); color: #fff; border: none; padding: 20px 60px; font-size: 1.1rem; font-weight: 600; cursor: pointer; border-radius: 50px; margin: 25px 0; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; }
        #result-box { display: none; width: 85%; max-width: 480px; margin: 20px auto; padding: 35px; background: #fff; border-radius: 25px; border: 1px solid var(--border); text-align: left; animation: fadeIn 0.8s ease; }
        .res-title { color: var(--gold); font-size: 1.4rem; border-bottom: 2px solid var(--cream); padding-bottom: 12px; margin-bottom: 15px; font-family: 'Playfair Display', serif; }
        .res-label { font-weight: 600; color: var(--gold); display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .product-card { border: 1px solid #f2f2f2; border-radius: 15px; padding: 12px; text-align: center; background: #fff; }
        .product-card img { width: 100%; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .loading-spinner { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--gold); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="vogue-header">OpticGrid</div>
    <p style="font-style: italic; color: #999; letter-spacing: 2px; font-size: 0.8rem;">Elite Biometric Analysis</p>

    <div class="container">
        <video id="input_video" playsinline></video>
        <button id="switch-btn" class="cam-switch">🔄</button>
    </div>

    <div id="loading" class="loading-spinner"></div>
    <button id="start-btn" class="btn-analyze" disabled>Analizi Başlat</button>

    <div id="result-box">
        <div class="res-title">Biyometrik Rapor</div>
        <div class="res-item"><span class="res-label">Yüz Geometrisi</span><span id="res-yuz" style="font-size: 1.2rem; font-weight: 600;"></span></div>
        <div class="res-item"><span class="res-label">Mimari Öneri</span><span id="res-oneri" style="color: #555; font-size: 0.95rem; font-weight: 400;"></span></div>
        <div class="res-item"><span class="res-label">İdeal Materyal</span><span id="res-materyal" style="color: #555; font-size: 0.95rem;"></span></div>
        
        <hr style="border: 0.5px solid #eee; margin: 25px 0;">
        <span class="res-label">Sizin İçin Seçtiklerimiz</span>
        <div id="product-list" class="product-grid"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const startBtn = document.getElementById('start-btn');
        const switchBtn = document.getElementById('switch-btn');
        const resultBox = document.getElementById('result-box');
        let currentFacingMode = 'user';

        function getDist(p1, p2, w, h) {
            return Math.sqrt(Math.pow((p1.x - p2.x)*w, 2) + Math.pow((p1.y - p2.y)*h, 2));
        }

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7 });

        let lastResults = null;
        faceMesh.onResults((results) => {
            lastResults = results;
            if (results.multiFaceLandmarks) startBtn.disabled = false;
        });

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacingMode }
            });
            videoElement.srcObject = stream;
            videoElement.play();
            const camera = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({image: videoElement}); },
                width: 640, height: 480
            });
            camera.start();
        }

        switchBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera();
        });

        startCamera();

        startBtn.addEventListener('click', () => {
            if (!lastResults?.multiFaceLandmarks) return;
            document.getElementById('loading').style.display = "block";
            startBtn.style.display = "none";

            const lm = lastResults.multiFaceLandmarks[0];
            const h = videoElement.videoHeight;
            const w = videoElement.videoWidth;

            // 468 NOKTA SÖMÜRME ANALİZİ
            const y_yuk = getDist(lm[10], lm[152], w, h);      // Alın-Çene
            const y_gen = getDist(lm[234], lm[454], w, h);    // Elmacıklar
            const alin_gen = getDist(lm[103], lm[332], w, h); // Alın
            const cene_gen = getDist(lm[132], lm[361], w, h); // Çene Genişliği

            const oran = y_yuk / y_gen;
            const oran_alin_cene = alin_gen / cene_gen;

            let yuz, oneri, materyal;

            if (oran > 1.45) {
                yuz = "UZUN (OBLONG)";
                oneri = "Yüzün dikey hattını dengelemek için derinliği olan Büyük Kare veya Geniş Wayfarer modelleri seçmelisiniz.";
                materyal = "Kalın asetat ve kemik çerçeveler yüzünüzde daha dolgun bir duruş sağlar.";
            } else if (oran < 1.15 && oran_alin_cene > 1.1) {
                yuz = "KALP / ÜÇGEN";
                oneri = "Alın genişliğini dengelemek için alt kısmı geniş olan Oval veya Cat-Eye modelleri tercih edilmelidir.";
                materyal = "İnce metalik çerçeveler veya çerçevesiz (rimless) modeller üst yüzü hafifletir.";
            } else if (oran < 1.15 && Math.abs(y_gen - cene_gen) < 15) {
                yuz = "KARE / KÖŞELİ";
                oneri = "Sert yüz hatlarını yumuşatmak için yuvarlak (Panto) veya kavisli kenarlı modeller idealdir.";
                materyal = "İnce gold/gümüş metal çerçeveler sert hatları asaletle dengeler.";
            } else if (oran < 1.15) {
                yuz = "YUVARLAK";
                oneri = "Yüzü daha ince ve uzun göstermek için keskin köşeli Dikdörtgen veya Geometrik çerçeveler seçin.";
                materyal = "Koyu renkli mat asetat çerçeveler yüzünüze karakter katar.";
            } else {
                yuz = "OVAL (DENGELİ)";
                oneri = "Doğal dengenizi korumak için her tür çerçeveyi kullanabilirsiniz; ancak Aviator ve Clubmaster modelleri favorimizdir.";
                materyal = "Hafif titanyum veya şeffaf kristal tonları modern bir duruş sergiler.";
            }

            document.getElementById('res-yuz').innerText = yuz;
            document.getElementById('res-oneri').innerText = oneri;
            document.getElementById('res-materyal').innerText = materyal;
            
            document.getElementById('loading').style.display = "none";
            resultBox.style.display = "block";
            
            // Veri Kaydetme Sinyali
            fetch('/save_result', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ad: "VIP Müşteri", yuz_tipi: yuz, oneri: oneri })
            });
        });
    </script>
</body>
</html>
