<body style="background-color: #fdf5e6; color: #5d4037; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="background: #ffffff; padding: 50px; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee8aa; width: 380px;">
        <h1 style="color: #bc8f8f; font-weight: 300; letter-spacing: 4px; margin-bottom: 5px; text-transform: uppercase;">OpticGrid</h1>
        <p style="font-size: 0.8em; color: #a0a0a0; margin-bottom: 40px; letter-spacing: 1px;">PREMIUM OPTICAL ANALYSIS</p>
        
        <form action="/check_login" method="post">
            <div style="margin-bottom: 20px;">
                <input name="user" placeholder="Kullanıcı Adı" style="width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #f5f5dc; background: #fafafa; outline: none; box-sizing: border-box; font-size: 0.9em;">
            </div>
            <div style="margin-bottom: 20px;">
                <input type="password" name="pass" placeholder="Şifre" style="width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #f5f5dc; background: #fafafa; outline: none; box-sizing: border-box; font-size: 0.9em;">
            </div>
            
            <button type="submit" style="width: 100%; padding: 18px; background: #bc8f8f; color: white; border: none; border-radius: 15px; cursor: pointer; font-size: 1em; font-weight: 600; transition: all 0.4s ease; margin-top: 10px; box-shadow: 0 6px 20px rgba(188, 143, 143, 0.3);">
                SİSTEMİ BAŞLAT
            </button>
        </form>
    </div>
</body>
