<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpticGrid | Partner Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --cream: #FDFBF7; --border: #E5D5B7; }
        body { background: var(--cream); font-family: 'Poppins', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: #fff; width: 90%; max-width: 420px; padding: 50px 40px; border-radius: 35px; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(197,160,89,0.1); text-align: center; }
        .vogue-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--gold); letter-spacing: 5px; margin-bottom: 5px; }
        .subtitle { color: #999; font-style: italic; margin-bottom: 40px; font-size: 0.9rem; letter-spacing: 1px; }
        input { width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 15px; border: 1px solid #eee; background: #fafafa; font-size: 1rem; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; background: #fff; }
        .btn-login { width: 100%; padding: 18px; background: var(--gold); color: #fff; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-login:hover { background: #b08b4a; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="vogue-title">OpticGrid</div>
        <div class="subtitle">B2B Elite Access</div>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Kullanıcı Adı" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit" class="btn-login">Giriş Yap</button>
        </form>
    </div>
</body>
</html>
